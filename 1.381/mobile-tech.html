<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#0a0e27">
    <title>Paletten App - Tech</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1425 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        .container {
            background: linear-gradient(135deg, rgba(20, 30, 60, 0.8) 0%, rgba(10, 15, 40, 0.9) 100%);
            border: 2px solid #00d4ff;
            border-radius: 0;
            padding: 0;
            max-width: 600px;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }

        .header {
            background: linear-gradient(90deg, transparent 0%, rgba(0, 212, 255, 0.1) 50%, transparent 100%);
            border-bottom: 1px solid #00d4ff;
            padding: max(16px, env(safe-area-inset-top) + 8px) 16px 16px 16px;
            position: relative;
            flex-shrink: 0;
        }

        .header::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #00d4ff 0%, #0099ff 100%);
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #00d4ff;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            padding-left: 4px;
        }

        .header-title::before {
            content: '▶';
            font-size: 10px;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 24px 16px;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
        }

        .content::-webkit-scrollbar {
            width: 6px;
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.3);
            border-radius: 3px;
        }

        h1 {
            font-size: 20px;
            color: #00d4ff;
            margin-bottom: 8px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 11px;
            color: #00d4ff;
            margin-bottom: 20px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .label {
            font-size: 10px;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: bold;
        }

        input, select, textarea {
            padding: 10px 12px;
            border: 1px solid #00d4ff;
            border-radius: 0;
            background: rgba(0, 212, 255, 0.05);
            color: #00d4ff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            transition: all 0.3s;
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
        }

        input::placeholder, textarea::placeholder {
            color: rgba(0, 212, 255, 0.4);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #00ffff;
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.3);
        }

        .btn {
            padding: 12px 16px;
            border: 1px solid #00d4ff;
            border-radius: 0;
            background: transparent;
            color: #00d4ff;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
            width: 100%;
            min-height: 44px;
            -webkit-appearance: none;
            appearance: none;
            touch-action: manipulation;
        }

        .btn:active {
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.3);
        }

        .btn-primary {
            border-color: #00ff00;
            color: #00ff00;
            margin-top: 16px;
        }

        .btn-primary:active {
            box-shadow: 0 0 16px rgba(0, 255, 0, 0.4);
            background: rgba(0, 255, 0, 0.1);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 16px;
        }

        .recording-area {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            min-height: 280px;
        }

        .scanner {
            width: 100px;
            height: 100px;
            border: 2px solid #00d4ff;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            position: relative;
            background: rgba(0, 212, 255, 0.05);
            box-shadow: inset 0 0 15px rgba(0, 212, 255, 0.1);
        }

        .scanner::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 1px;
            background: #00d4ff;
            top: 50%;
            animation: scan 1.5s ease-in-out infinite;
        }

        @keyframes scan {
            0%, 100% { top: 20%; }
            50% { top: 80%; }
        }

        .status {
            font-size: 11px;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.8;
        }

        .success-message {
            text-align: center;
            padding: 16px 0;
        }

        .success-icon {
            font-size: 48px;
            margin-bottom: 12px;
            animation: pulse-success 0.5s ease-out;
        }

        @keyframes pulse-success {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .success-text {
            font-size: 14px;
            color: #00ff00;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .phase {
            display: none;
        }

        .phase.active {
            display: flex;
            flex-direction: column;
        }

        @media (max-height: 600px) {
            .recording-area {
                min-height: 240px;
                gap: 16px;
            }

            .scanner {
                width: 90px;
                height: 90px;
                font-size: 40px;
            }

            h1 {
                font-size: 18px;
            }
        }

        @media (orientation: landscape) {
            .content {
                padding: 12px 16px;
            }

            h1 {
                font-size: 16px;
                margin-bottom: 4px;
            }

            .subtitle {
                margin-bottom: 12px;
                font-size: 10px;
            }

            .form-group {
                margin-bottom: 12px;
            }

            .recording-area {
                min-height: 180px;
                gap: 12px;
            }

            .scanner {
                width: 80px;
                height: 80px;
                font-size: 36px;
            }

            .btn {
                min-height: 40px;
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">PALETTEN SYSTEM</div>
        </div>

        <div class="content">
            <div id="loginPhase" class="phase active">
                <h1>LOGIN</h1>
                <p class="subtitle">> Authentifizierung erforderlich</p>

                <div class="form-group">
                    <label class="label">> MITARBEITERNAME</label>
                    <input type="text" id="username" placeholder="[EINGABE]" autocomplete="username">
                </div>

                <div class="form-group">
                    <label class="label">> PASSWORT</label>
                    <input type="password" id="password" placeholder="[EINGABE]" autocomplete="current-password">
                </div>

                <button class="btn btn-primary" onclick="handleLogin()">> ZUGRIFF GEWÄHREN</button>
            </div>

            <div id="recordingPhase" class="phase">
                <h1>ERFASSUNG</h1>
                <p class="subtitle">> Audio-Input aktiv</p>

                <div class="recording-area">
                    <div class="scanner">🎤</div>
                    <button class="btn btn-primary">> AUFNAHME STARTEN</button>
                    <p class="status">● BEREIT</p>
                </div>

                <div class="btn-group">
                    <button class="btn">> MANUELL</button>
                    <button class="btn">> DATEN</button>
                </div>
            </div>

            <div id="successPhase" class="phase">
                <div class="success-message">
                    <div class="success-icon">✓</div>
                    <div class="success-text">ERFOLGREICH</div>
                    <button class="btn btn-primary">> NÄCHSTER EINTRAG</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function setPhase(phaseName) {
            document.querySelectorAll('.phase').forEach(p => p.classList.remove('active'));
            document.getElementById(phaseName).classList.add('active');
        }

        function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                alert('Mitarbeitername und Passwort erforderlich');
                return;
            }

            setPhase('recordingPhase');
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('password').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleLogin();
            });
        });
    </script>
</body>
</html>
