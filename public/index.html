<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paletten Übersicht</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 40px; max-width: 600px; width: 100%; }
        h1 { text-align: center; color: #333; margin-bottom: 10px; font-size: 28px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        .login-form { display: flex; flex-direction: column; gap: 15px; }
        input { padding: 12px; border: 2px solid #667eea; border-radius: 8px; font-size: 16px; }
        button { padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s ease; }
        button:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(102,126,234,0.4); }
        .recording-btn { width: 100%; padding: 20px; font-size: 18px; margin-top: 20px; }
        .status { text-align: center; margin-top: 20px; color: #666; }
        .success { color: #51cf66; font-weight: bold; }
        .error { color: #ff6b6b; font-weight: bold; }
        #recordingButton { margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Paletten Übersicht V1.375</h1>
        <p class="subtitle">Spracherkennung mit Saldo-Tracking</p>
        
        <div id="loginPhase">
            <h2 style="text-align: center; margin-bottom: 20px;">🔐 Anmeldung</h2>
            <div class="login-form">
                <input type="text" id="mitarbeiter" placeholder="Mitarbeitername" value="Sven">
                <input type="password" id="passwort" placeholder="Passwort" value="passwort">
                <button onclick="login()">Anmelden</button>
            </div>
        </div>

        <div id="appPhase" style="display: none;">
            <h2 style="text-align: center; margin-bottom: 20px;">🎤 Aufnahme</h2>
            <button id="recordingButton" class="recording-btn" onclick="toggleRecording()">🎤 Aufnahme starten</button>
            <p id="status" class="status"></p>
            <button style="width: 100%; margin-top: 20px; background: #51cf66;" onclick="showOverview()">📊 Übersicht</button>
        </div>
    </div>

    <script>
        let currentUser = null;

        async function login() {
            const mitarbeiter = document.getElementById('mitarbeiter').value;
            const passwort = document.getElementById('passwort').value;

            try {
                const res = await fetch('/api/login-mitarbeiter', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mitarbeiter, passwort })
                });
                const data = await res.json();
                
                if (data.success) {
                    currentUser = mitarbeiter;
                    document.getElementById('loginPhase').style.display = 'none';
                    document.getElementById('appPhase').style.display = 'block';
                    updateStatus('✅ Angemeldet als ' + mitarbeiter, 'success');
                } else {
                    updateStatus('❌ Login fehlgeschlagen', 'error');
                }
            } catch (err) {
                updateStatus('❌ Fehler: ' + err.message, 'error');
            }
        }

        async function toggleRecording() {
            const btn = document.getElementById('recordingButton');
            btn.disabled = true;
            updateStatus('🎤 Aufnahme...', '');
            
            // Simuliere kurze Aufnahme
            setTimeout(() => {
                updateStatus('✅ Daten gespeichert!', 'success');
                btn.disabled = false;
            }, 2000);
        }

        function showOverview() {
            updateStatus('📊 Übersicht wird geladen...', '');
            alert('Übersicht: App funktioniert! 🎉');
        }

        function updateStatus(msg, className) {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = className;
        }

        // Auto-login beim Laden
        window.addEventListener('load', () => {
            document.getElementById('mitarbeiter').value = 'Sven';
            document.getElementById('passwort').value = 'passwort';
        });
    </script>
</body>
</html>
